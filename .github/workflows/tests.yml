name: Flutter Tests

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      # Como ya comiteamos los archivos generados (.mocks.dart), 
      # no es estrictamente necesario correr build_runner aquí, 
      # lo que ahorra tiempo de cómputo en GitHub Actions.
      
      - name: Run Tests
        run: flutter test
